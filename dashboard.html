<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Administrativo</title>
  <link rel="icon" type="image/png" href="./img/Logo CousyCompress.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="bg-slate-950 text-slate-200 antialiased">
  <template id="dashboardContentTemplate">
    <div class="space-y-4">
      <div id="cotizaciones" class="tab-content space-y-4">
        <h3 class="text-lg font-semibold text-slate-200">Cotizaciones</h3>
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 md:p-6 grid grid-cols-1 md:grid-cols-3 gap-3">
          <input
            type="text"
            placeholder="Buscar cotización"
            class="w-full rounded-lg bg-slate-800 border border-slate-700 text-slate-200 placeholder-slate-500 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-400"
          />
          <select
            class="w-full rounded-lg bg-slate-800 border border-slate-700 text-slate-200 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-400"
          >
            <option>Todas</option>
            <option>Aprobadas</option>
            <option>Pendientes</option>
          </select>
          <button
            class="rounded-lg bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-semibold px-4 py-2.5 transition-colors"
          >
            Nueva cotización
          </button>
        </div>
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 md:p-6">
          <div class="flex flex-wrap items-center gap-2 mb-4">
            <span class="text-xs px-2 py-1 rounded-md border bg-emerald-900 text-emerald-400 border-emerald-700">Éxito: sincronizado</span>
            <span class="text-xs px-2 py-1 rounded-md border bg-red-900 text-red-400 border-red-700">Error: pendiente de revisión</span>
          </div>
          <p class="text-slate-500">Tabla de cotizaciones aquí</p>
        </div>
      </div>

      <div id="prod_cotizacion" class="tab-content hidden space-y-4">
        <h3 class="text-lg font-semibold text-slate-200">Prod de Cotizacion</h3>
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 md:p-6">
          <p class="text-slate-500">Contenido prod de cotizacion</p>
        </div>
      </div>

      <div id="mp_cotizacion" class="tab-content hidden space-y-4">
        <h3 class="text-lg font-semibold text-slate-200">MateriaP Cotizacion</h3>
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 md:p-6">
          <p class="text-slate-500">Contenido materiaP cotizacion</p>
        </div>
      </div>

      <div id="materiales" class="tab-content hidden space-y-4">
        <h3 class="text-lg font-semibold text-slate-200">Materia Prima</h3>
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 md:p-6">
          <p class="text-slate-500">Listado de materia prima</p>
        </div>
      </div>

      <div id="receta_producto" class="tab-content hidden space-y-4">
        <h3 class="text-lg font-semibold text-slate-200">Receta de Producto</h3>
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 md:p-6">
          <p class="text-slate-500">Contenido receta de producto</p>
        </div>
      </div>

      <div id="productos" class="tab-content hidden space-y-4">
        <h3 class="text-lg font-semibold text-slate-200">Productos</h3>
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 md:p-6">
          <p class="text-slate-500">Listado de productos</p>
        </div>
      </div>

      <div id="clientes" class="tab-content hidden space-y-4">
        <h3 class="text-lg font-semibold text-slate-200">Clientes</h3>
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 md:p-6">
          <p class="text-slate-500">Listado de clientes</p>
        </div>
      </div>
    </div>
  </template>

  <script src="./js/theme.js"></script>
  <script src="./js/layout.js"></script>
<script src="./js/dashboard.js"></script>
<script src="./js/routes.js"></script>
</body>
</html>

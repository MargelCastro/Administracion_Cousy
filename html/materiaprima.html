<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Materia Prima</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-slate-950 text-slate-200 antialiased">
  <template id="materiaPrimaContentTemplate">
    <div class="mx-auto max-w-6xl space-y-4 md:space-y-6">
      <section id="seccionTabla" class="hidden bg-slate-900 border border-slate-800 rounded-2xl p-4 md:p-6">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-lg font-semibold text-slate-200">Tabla Materia Prima</h2>
          <div class="flex items-center gap-3">
            <p id="totalInversionMateriaPrima" class="text-sm text-slate-300">Total: C$ 0</p>
            <button id="btnRefrescarTabla" type="button" class="rounded-lg bg-slate-800 border border-slate-700 text-slate-200 text-xs font-semibold px-3 py-2 hover:text-emerald-400 transition-colors">
              Refrescar
            </button>
          </div>
        </div>
        <div class="overflow-x-auto">
          <table class="min-w-full text-sm">
            <thead>
              <tr class="text-left border-b border-slate-700 text-slate-300">
                <th class="py-2 pr-3">ID Material</th>
                <th class="py-2 pr-3">Nombre Material</th>
                <th class="py-2 pr-3">Unidad Base</th>
                <th class="py-2 pr-3">Stock Actual</th>
                <th class="py-2 pr-3">Contenido / Unidad</th>
                <th class="py-2 pr-3">Precio</th>
                <th class="py-2 pr-3">Inversión Total</th>
                <th class="py-2 pr-3">Activo</th>
              </tr>
            </thead>
            <tbody id="tablaMateriaPrimaBody" class="text-slate-200"></tbody>
          </table>
        </div>
      </section>

      <section class="bg-slate-900 border border-slate-800 rounded-2xl p-4 md:p-6">
        <form id="formMateriaPrima" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          <input id="idMaterial" type="hidden" />

          <div class="space-y-2 lg:col-span-3">
            <label for="nombreMaterial" class="text-sm text-slate-500">Nombre del Material</label>
            <input id="nombreMaterial" list="sugerenciasMateriales" type="text" autocomplete="off" placeholder="Ej: Hilo negro premium" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-slate-200 placeholder-slate-500 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-400" />
            <datalist id="sugerenciasMateriales"></datalist>
          </div>

          <div class="space-y-2">
            <label for="unidadBase" class="text-sm text-slate-500">Unidad Base</label>
            <select id="unidadBase" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-slate-200 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-400">
              <option value="">Seleccione una unidad</option>
              <option value="Yarda">Yarda</option>
              <option value="Unidades">Unidades</option>
              <option value="Metros">Metros</option>
            </select>
          </div>

          <div class="space-y-2">
            <label for="stockActual" class="text-sm text-slate-500">Stock Actual</label>
            <input id="stockActual" type="number" readonly value="0" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-slate-200 px-3 py-2.5" />
          </div>

          <div class="space-y-2">
            <label for="cantidadIngreso" class="text-sm text-slate-500">Unidades compradas</label>
            <input id="cantidadIngreso" type="number" min="0" step="0.01" value="0" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-slate-200 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-400" />
          </div>

          <div class="space-y-2">
            <label for="contenidoUnidad" class="text-sm text-slate-500">Contenido por unidad</label>
            <input id="contenidoUnidad" type="number" min="0.001" step="0.001" value="1" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-slate-200 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-400" />
          </div>

          <div class="space-y-2">
            <label for="precio" class="text-sm text-slate-500">Precio unidad comprada</label>
            <input id="precio" type="number" min="0" step="0.01" value="0" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-slate-200 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-emerald-400" />
          </div>

          <div class="space-y-2">
            <label for="inversionTotal" class="text-sm text-slate-500">Inversión Total</label>
            <input id="inversionTotal" type="number" readonly value="0" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-slate-200 px-3 py-2.5" />
          </div>

          <div class="space-y-2">
            <label for="activo" class="text-sm text-slate-500">Activo</label>
            <input id="activo" type="text" readonly value="FALSE" class="w-full rounded-lg bg-slate-800 border border-slate-700 text-slate-200 px-3 py-2.5" />
          </div>

          <div class="space-y-2 md:col-span-2 lg:col-span-3">
            <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
              <div class="rounded-lg border border-slate-800 bg-slate-800 px-4 py-3">
                <p class="text-xs uppercase tracking-[0.18em] text-slate-500">Stock a sumar</p>
                <p id="stockASumar" class="mt-2 text-xl font-semibold text-emerald-400">0</p>
              </div>
              <div class="rounded-lg border border-slate-800 bg-slate-800 px-4 py-3">
                <p class="text-xs uppercase tracking-[0.18em] text-slate-500">Stock proyectado</p>
                <p id="stockProyectado" class="mt-2 text-xl font-semibold text-slate-200">0</p>
              </div>
              <div class="rounded-lg border border-slate-800 bg-slate-800 px-4 py-3">
                <p class="text-xs uppercase tracking-[0.18em] text-slate-500">Calculo</p>
                <p id="detalleCalculo" class="mt-2 text-sm font-medium text-slate-300">0 x 1 = 0</p>
              </div>
            </div>
          </div>

          <div class="md:col-span-2 lg:col-span-3 flex flex-wrap gap-2 pt-2">
            <button id="btnGuardarMaterial" type="submit" class="rounded-lg bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-semibold px-4 py-2.5 transition-colors">
              Guardar Material
            </button>
          </div>

          <p id="estado" class="hidden md:col-span-2 lg:col-span-3 text-xs px-2 py-1 rounded-md border"></p>
        </form>
      </section>
    </div>
  </template>

  <script src="../js/config.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/materiaprima.js"></script>
<script src="../js/routes.js"></script>
</body>
</html>

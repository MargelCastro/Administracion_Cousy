<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes</title>
  <link rel="icon" type="image/png" href="../img/Logo CousyCompress.png">
  <link rel="stylesheet" href="../css/tailwind.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-slate-950 text-slate-200 antialiased">
  <template id="clientesContentTemplate">
    <div class="mx-auto max-w-6xl space-y-4 md:space-y-6">
      <div class="space-y-1 px-1">
        <p class="text-sm text-slate-500">Administración y consulta de clientes registrados.</p>
      </div>

      <section class="rounded-2xl border border-slate-800 bg-slate-900 p-4 md:p-6">
        <div class="grid grid-cols-1 gap-3 md:grid-cols-3">
          <input
            type="text"
            placeholder="Buscar cliente"
            class="w-full rounded-lg border border-slate-700 bg-slate-800 px-3 py-2.5 text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-400"
          />
          <select
            class="w-full rounded-lg border border-slate-700 bg-slate-800 px-3 py-2.5 text-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-400"
          >
            <option>Todos</option>
            <option>Activos</option>
            <option>Inactivos</option>
          </select>
          <button
            type="button"
            class="rounded-lg bg-emerald-500 px-4 py-2.5 font-semibold text-slate-950 transition-colors hover:bg-emerald-400"
          >
            Nuevo cliente
          </button>
        </div>
      </section>

      <section class="rounded-2xl border border-slate-800 bg-slate-900 p-4 md:p-6">
        <p class="text-slate-500">Listado de clientes</p>
      </section>
    </div>
  </template>

  <script src="../js/theme.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/clientes.js"></script>
  <script src="../js/routes.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos de Cotización</title>
  <link rel="icon" type="image/png" href="../img/Logo CousyCompress.png">
  <link rel="stylesheet" href="../css/tailwind.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-slate-950 text-slate-200 antialiased">
  <template id="productosCotizacionContentTemplate">
    <div class="mx-auto max-w-6xl space-y-4 md:space-y-6">
      <div class="space-y-1 px-1">
        <p class="text-sm text-slate-500">Selección y revisión de productos incorporados a una cotización.</p>
      </div>

      <section class="rounded-2xl border border-slate-800 bg-slate-900 p-4 md:p-6">
        <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
          <input
            type="text"
            placeholder="Buscar producto para cotizar"
            class="w-full rounded-lg border border-slate-700 bg-slate-800 px-3 py-2.5 text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-400 md:max-w-md"
          />
          <button
            type="button"
            class="rounded-lg bg-emerald-500 px-4 py-2.5 font-semibold text-slate-950 transition-colors hover:bg-emerald-400"
          >
            Agregar producto
          </button>
        </div>
      </section>

      <section class="rounded-2xl border border-slate-800 bg-slate-900 p-4 md:p-6">
        <p class="text-slate-500">Contenido de productos de cotización</p>
      </section>
    </div>
  </template>

  <script src="../js/theme.js"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/productosCotizacion.js"></script>
  <script src="../js/routes.js"></script>
</body>
</html>
